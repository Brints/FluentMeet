<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333333;
      background-color: #f4f7f6;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      width: 100%;
      background-color: #f4f7f6;
      padding: 40px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    .header {
      background-color: #4F46E5;
      padding: 30px 20px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 24px;
      font-weight: 600;
    }
    .content {
      padding: 30px 40px;
    }
    .content h2 {
      color: #111827;
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 20px;
    }
    .content p {
      margin: 0 0 15px;
      font-size: 16px;
      color: #4B5563;
    }
    .button-container {
      text-align: center;
      margin: 30px 0;
    }
    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #4F46E5;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
    }
    .footer {
      background-color: #f9fafb;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #e5e7eb;
    }
    .footer p {
      margin: 0;
      font-size: 14px;
      color: #6B7280;
    }
    .footer .link-fallback {
      word-break: break-all;
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>Spoken</h1>
      </div>
      <div class="content">
        <h2>Verify your email</h2>
        <p>Welcome to Spoken!</p>
        <p>Please verify your email address to complete your registration and get started.</p>
        <div class="button-container">
          <a href="{{ verification_link }}" class="button">Verify Email</a>
        </div>
      </div>
      <div class="footer">
        <p class="link-fallback">If the button doesn't work, copy and paste this link:<br><a style="color: #6B7280;" href="{{ verification_link }}">{{ verification_link }}</a></p>
        <p>&copy; 2026 Spoken. All rights reserved.</p>
      </div>
    </div>
  </div>
</body>

</html>
